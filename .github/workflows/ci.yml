name: Backend CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify deploy layout
        run: npm run verify:deploy

  deploy:
    if: github.event_name == 'push'
    needs: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Build
        run: npm run build

      - name: Verify deploy layout
        run: npm run verify:deploy

      - name: Package deployment zip
        run: >-
          zip -r deploy-backend.zip
          host.json package.json package-lock.json dist
          claims-analyze config-debug health search-openalex search-combined
          sources-parse sources-enrich suggestions-resolve node_modules

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: gmu-hack-functions2
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: backend/deploy-backend.zip
